name: Monthly data update

on:
  schedule:
    # Runs at 7:00 AM Pacific on the 3rd day of each month.
    - cron: "0 15 3 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run monthly updater
        run: python scripts/update_monthly.py
      - name: Commit updated data
        run: |
          git config user.name "monthly-dashboard-bot"
          git config user.email "actions@github.com"
          git add data/monthly_observations.csv data/scenario_scores.csv
          git commit -m "Monthly data update" || echo "No changes to commit"
          git push
